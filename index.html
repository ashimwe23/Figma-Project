<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma Page</title>
    <link rel="stylesheet" href="output.css">
</head>
<body class="bg-white">

<!-- NAVBAR -->
<header class="max-w-7xl mx-auto flex justify-between items-center py-6 px-10">

    <img src="image/logo.png" class="h-10" />

    <ul class="hidden md:flex space-x-10 text-gray-700">
        <li><a href="#">About</a></li>
        <li><a href="#">Features</a></li>
        <li><a href="#">Pricing</a></li>
        <li><a href="#">Testimonial</a></li>
        <li><a href="#">Help</a></li>
    </ul>

    <div class="space-x-4">
        <a class="font-bold" href="#">Sign In</a>
        <button class="border border-red-500 text-red-500 px-6 py-2 rounded-full">
            Sign Up
        </button>
    </div>

</header>

<!-- HERO -->
<section class="max-w-7xl mx-auto flex justify-between items-center mt-20 px-10">

    <div>
        <h1 class="text-5xl font-semibold leading-tight">
            Want anything to be <br>
            easy with <strong>LaslesVPN</strong>
        </h1>

        <p class="text-gray-600 mt-5">
            Provide network for all your needs using LaslesVPN.
        </p>

        <button class="mt-8 bg-red-500 text-white px-10 py-3 rounded-lg">
            Get Started
        </button>
    </div>

    <img src="image/person-1.png" class="w-1/2" />

</section>

<!-- STATS -->
<div class="max-w-5xl mx-auto mt-16 bg-white shadow-lg rounded-xl px-12 py-8">

    <div class="flex justify-between items-center">

        <div class="flex items-center space-x-4">
            <img src="image/users.png" class="w-10 h-10" />
            <div>
                <h2 class="text-xl font-bold">90+</h2>
                <p class="text-gray-500">Users</p>
            </div>
        </div>

        <div class="w-px h-12 bg-gray-300"></div>

        <div class="flex items-center space-x-4">
            <img src="image/locations.png" class="w-10 h-10" />
            <div>
                <h2 class="text-xl font-bold">30+</h2>
                <p class="text-gray-500">Locations</p>
            </div>
        </div>

        <div class="w-px h-12 bg-gray-300"></div>

        <div class="flex items-center space-x-4">
            <img src="image/servers.png" class="w-10 h-10" />
            <div>
                <h2 class="text-xl font-bold">50+</h2>
                <p class="text-gray-500">Servers</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
